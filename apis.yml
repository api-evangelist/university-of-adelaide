---
aid: university-of-adelaide
name: University of Adelaide
description: >-
  The University of Adelaide is a public research university in Adelaide, South
  Australia, founded in 1874, and ranked #72 in the QS World University Rankings
  2025. Its public, developer-facing footprint is centered on open scholarly
  infrastructure rather than a unified developer portal: the "Adelaide Research &
  Scholarship" institutional repository runs on DSpace 7.6.1 and exposes both a
  REST API and an OAI-PMH metadata endpoint, and the university operates an
  Adelaide Figshare research-data instance backed by the shared Figshare public
  API and OAI-PMH. Authentication is handled by a CAS-based single sign-on, and
  the institution maintains a public GitHub organization built largely around its
  Drupal "Shepherd" site-management platform. No consolidated, self-service public
  API developer portal was found.
