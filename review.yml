reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      No unified, self-service public API developer portal was found for the
      University of Adelaide. Verified live machine interfaces are scholarly
      infrastructure: the "Adelaide Research & Scholarship" DSpace 7.6.1
      repository REST API and its OAI-PMH endpoint both responded, and the
      Adelaide Figshare research-data instance is backed by the live shared
      Figshare public REST API and OAI-PMH. SSO is CAS-based at
      login.adelaide.edu.au. A real public GitHub org (universityofadelaide,
      ~37 repos, Drupal "Shepherd") exists. Course-outlines and timetable
      systems are web apps with no documented public API. No endpoints were
      fabricated; every cataloged interface was probed directly.
    endpoints:
      - url: https://digital.library.adelaide.edu.au/server/api
        status: 200
        note: DSpace 7.6.1 REST root; returns repository name "Adelaide Research & Scholarship".
      - url: https://digital.library.adelaide.edu.au/server/oai/request?verb=Identify
        status: 200
